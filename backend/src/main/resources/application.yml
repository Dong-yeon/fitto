spring:
  application:
    name: fitto

  # PostgreSQL (설계서 6.1) — 환경변수로 주입, 기본값은 로컬 개발
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fitto}
    username: ${DB_USERNAME:fitto}
    password: ${DB_PASSWORD:fitto}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate   # 스키마는 Flyway가 관리
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  jackson:
    deserialization:
      fail-on-unknown-properties: false   # 클라이언트의 부가 필드는 무시
    default-property-inclusion: non_null

  # Flyway 마이그레이션 (DB 구성)
  flyway:
    enabled: true
    baseline-on-migrate: true

  # Redis (초대코드/세션/소켓 — 설계서 6.1)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

# 애플리케이션 커스텀 설정
fitto:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-me-in-production-please-32bytes}
    access-token-expire-minutes: 30
    refresh-token-expire-days: 14

logging:
  level:
    com.fitto: DEBUG
